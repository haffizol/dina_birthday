<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Dina!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* AESTHETIC: Dark mode, cool, gamer vibes */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            background-color: #1a1a1f; 
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* CHAOTIC BACKGROUND EFFECT */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 200vw; height: 200vh;
            background: repeating-linear-gradient(
                45deg,
                rgba(0, 0, 0, 0.2),
                rgba(0, 0, 0, 0.2) 10px,
                rgba(88, 101, 242, 0.05) 10px,
                rgba(88, 101, 242, 0.05) 20px
            );
            pointer-events: none;
            z-index: -1;
            animation: chaoticMove 20s linear infinite;
        }

        @keyframes chaoticMove {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(-50%, -50%); }
        }

        /* HUGE HEADER */
        .hero {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            background-image: url('https://github.com/haffizol/dina_birthday/blob/main/White%20and%20Black%20Minimalist%20Photo%20Birthday%20Your%20Story.png?raw=true');
            background-size: cover;
            background-position: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            color: #8b949e;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* GAME SECTION */
        .game-section {
            padding: 60px 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-section h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: #c9d1d9;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        }

        .presents-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .present {
            background-color: #2b2d31;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid transparent;
        }

        .present img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .present p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #f0f6fc;
        }

        /* ERROR SHAKE ANIMATION */
        .error-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-color: #ff4a4a !important;
            box-shadow: 0 0 20px rgba(255, 74, 74, 0.6) !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* OFFICIAL WISH SECTION */
        .reveal-section {
            display: none;
            padding: 40px 20px;
            text-align: center;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .reveal-section.visible {
            display: flex;
            opacity: 1;
        }

        .wise-choice {
            font-size: 2.5rem;
            color: #5865F2; 
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(88, 101, 242, 0.5);
        }

        /* PLAIN TEXT WRITING AREA */
        .typing-container {
            max-width: 500px;
            text-align: left;
            font-size: 1.2rem;
            line-height: 1.8;
            /* Subtle dark backdrop so text is easy to read against chaotic background */
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            min-height: 200px; 
        }

        #typewriter-text {
            color: #e6e6e6;
        }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #5865F2;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="scroll-down">Scroll Down ↓</div>
    </header>

    <section class="game-section" id="game-section">
        <h2>Choose ur present 🎁</h2>
        <div class="presents-grid">
            
            <div class="present wrong-choice">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/onitsuka.png?raw=true" alt="Onitsuka Mexico 66">
                <p>Onitsuka Mexico 66</p>
            </div>

            <div class="present wrong-choice">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/samba.png?raw=true" alt="Adidas Samba">
                <p>Adidas Samba</p>
            </div>

            <div class="present wrong-choice">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/mu%20jersey.png?raw=true" alt="A Shirt">
                <p>"Cool" Jersey</p>
            </div>

            <div class="present" id="choose-me">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/photo_6156462459632422516_y.jpg?raw=true" alt="Me">
                <p>this Gigachad</p>
            </div>

        </div>
    </section>

    <section class="reveal-section" id="reveal-section">
        <h1 class="wise-choice">Wise Choice.</h1>
        <div class="typing-container">
            <span id="typewriter-text"></span><span class="cursor"></span>
        </div>
    </section>

    <script>
        const wrongItems = document.querySelectorAll('.wrong-choice');
        const chooseMeBtn = document.getElementById('choose-me');
        const gameSection = document.getElementById('game-section');
        const revealSection = document.getElementById('reveal-section');
        const typeWriterElement = document.getElementById('typewriter-text');

        // PUT YOUR ACTUAL MESSAGE HERE
        // Use \n\n to create new paragraphs.
        const officialMessage = "Hey Dina,\n\nHappy Birthday! I'm glad we crossed paths on Discord back in '23. From the games to just hanging out, you've always been a real one.\n\nI know you're going through a lot right now, but just remember you're a homie and I've got your back. Keep being the cool, weird girl you are.\n\nStay cool,\n- [Your Name]";

        // Wrong choice logic (Red border + Shake + Vibrate)
        wrongItems.forEach(item => {
            item.addEventListener('click', function() {
                // Try to vibrate phone for 200ms
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                
                // Add the red shake animation
                this.classList.add('error-shake');
                
                // Remove the animation class after it finishes so it can trigger again
                setTimeout(() => {
                    this.classList.remove('error-shake');
                }, 400);
            });
        });

        // Typewriter function
        let i = 0;
        function typeWriter() {
            if (i < officialMessage.length) {
                // If the character is a newline, add a <br> tag instead of \n
                if (officialMessage.charAt(i) === '\n') {
                    typeWriterElement.innerHTML += '<br>';
                } else {
                    typeWriterElement.innerHTML += officialMessage.charAt(i);
                }
                i++;
                setTimeout(typeWriter, 40); // 40ms per letter. Adjust for speed.
            }
        }

        // The logic for when she clicks YOU
        chooseMeBtn.addEventListener('click', () => {
            
            // Fire Confetti!
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#5865F2', '#ffffff', '#8b949e'] // Discord blurple + white + grey
            });

            // Hide the game smoothly
            gameSection.style.transition = "opacity 0.5s ease";
            gameSection.style.opacity = "0";
            
            setTimeout(() => {
                gameSection.style.display = "none";
                
                // Show the official message
                revealSection.classList.add('visible');
                
                // Scroll down to the message smoothly
                revealSection.scrollIntoView({ behavior: 'smooth' });

                // Wait half a second, then start typing the message
                setTimeout(typeWriter, 500);

            }, 500);
        });
    </script>
</body>
</html>
