<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Dina!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* AESTHETIC: Dark mode, gamer vibes, plus emotional handwriting font */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Space+Grotesk:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            background-color: #1a1a1f; 
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* CHAOTIC BACKGROUND EFFECT */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 200vw; height: 200vh;
            background: repeating-linear-gradient(
                45deg,
                rgba(0, 0, 0, 0.2),
                rgba(0, 0, 0, 0.2) 10px,
                rgba(88, 101, 242, 0.05) 10px,
                rgba(88, 101, 242, 0.05) 20px
            );
            pointer-events: none;
            z-index: -1;
            animation: chaoticMove 20s linear infinite;
        }

        @keyframes chaoticMove {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(-50%, -50%); }
        }

        /* HUGE HEADER */
        .hero {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            background-image: url('https://github.com/haffizol/dina_birthday/blob/main/White%20and%20Black%20Minimalist%20Photo%20Birthday%20Your%20Story.png?raw=true');
            background-size: cover;
            background-position: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            color: #8b949e;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* GAME SECTION */
        .game-section {
            padding: 60px 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-section h2 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #c9d1d9;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        }

        .volume-warning {
            color: #5865F2;
            font-size: 0.9rem;
            margin-bottom: 15px;
            animation: pulseText 1.5s infinite;
            font-weight: bold;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* TAUNT TEXT */
        .taunt-container {
            height: 30px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #ff4a4a;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            text-shadow: 0px 0px 10px rgba(255, 74, 74, 0.6);
        }

        .presents-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .present {
            background-color: transparent;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .present img {
            width: 100%;
            margin-bottom: 10px;
            aspect-ratio: 1/1;
            object-fit: contain;
            filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.6));
            transition: transform 0.2s ease;
        }

        .present:hover img {
            transform: scale(1.05);
        }

        .present p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #f0f6fc;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* ERROR SHAKE ANIMATION */
        .error-shake img {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            filter: drop-shadow(0px 0px 15px rgba(255, 74, 74, 0.8)) !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* OFFICIAL WISH SECTION */
        .reveal-section {
            display: none;
            padding: 40px 20px;
            text-align: center;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .reveal-section.visible {
            display: flex;
            opacity: 1;
        }

        .wise-choice {
            font-size: 2.5rem;
            color: #5865F2; 
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(88, 101, 242, 0.5);
        }

        .typing-container {
            max-width: 500px;
            text-align: left;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            min-height: 200px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 4px solid #5865F2;
        }

        /* EMOTIONAL FONT SETTINGS */
        #typewriter-text {
            color: #e6e6e6;
            font-family: 'Caveat', cursive; /* Handwritten emotional font */
            font-size: 1.8rem; /* Made bigger because handwritten fonts read smaller */
            line-height: 1.4;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.5rem;
            background-color: #5865F2;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 5px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bday-song" src="https://github.com/haffizol/dina_birthday/blob/main/Coldplay%20-%20Sparks%20-%20Instrumental%20(NO%20VOICE!).mp3?raw=true"></audio>

    <header class="hero">
        <div class="scroll-down">Scroll Down ↓</div>
    </header>

    <section class="game-section" id="game-section">
        <h2>Choose ur present 🎁</h2>
        <div class="volume-warning">🔊 P.S. Turn up your volume</div>
        
        <div class="taunt-container" id="taunt-box">Nope. Try again.</div>

        <div class="presents-grid">
            
            <div class="present wrong-choice" data-name="Onitsuka">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/onitsuka.png?raw=true" alt="Onitsuka Mexico 66">
                <p>Onitsuka Mexico 66</p>
            </div>

            <div class="present wrong-choice" data-name="Samba">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/samba.png?raw=true" alt="Adidas Samba">
                <p>Adidas Samba</p>
            </div>

            <div class="present wrong-choice" data-name="Jersey">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/mu%20jersey.png?raw=true" alt="A Shirt">
                <p>"Cool" Jersey</p>
            </div>

            <div class="present" id="choose-me">
                <img src="https://github.com/haffizol/dina_birthday/blob/main/photo_6156462459632422516_y.jpg?raw=true" alt="Me">
                <p>this Gigachad</p>
            </div>

        </div>
    </section>

    <section class="reveal-section" id="reveal-section">
        <h1 class="wise-choice">Wise Choice.</h1>
        <div class="typing-container">
            <span id="typewriter-text"></span><span class="cursor"></span>
        </div>
    </section>

    <script>
        // --- SETUP ---
        const wrongItems = document.querySelectorAll('.wrong-choice');
        const chooseMeBtn = document.getElementById('choose-me');
        const revealSection = document.getElementById('reveal-section');
        const typeWriterElement = document.getElementById('typewriter-text');
        const tauntBox = document.getElementById('taunt-box');
        const bgMusic = document.getElementById('bday-song');

        // SPECIFIC ITEM TRACKER
        let clickStats = {
            Onitsuka: 0,
            Samba: 0,
            Jersey: 0
        };

        // THE TAUNTS (Upgraded with emojis and extra disrespect)
        const taunts = [
            "Bruh, really? 💀",
            "L choice 🤡",
            "Are you blind? 👓",
            "Bro, be so fr right now 🤦‍♀️",
            "Not that one! 🚫",
            "Did you even look at the options? 🤨",
            "Skill issue. 🎮",
            "Emotional damage 📉",
            "Wrong. Do better. 🚮"
        ];
        // YOUR MESSAGE
        const officialMessage = `Dear Dina,\n\nI hope this msg finds u well. Before anything TW!!! aku tak reti siot buat ayat ayat emotional camni but aku try jele. So bear with me.\n\nFirst of all…\n\nHAPPY BIRTHDAYYYYY DINAAAAAA 🎉\n\n24 oledi weh… damn u old bish now. Older than me pulak?? Illegal behaviour tbh. But jokes aside… congrats for surviving 24 years of life in this crazy world. And I mean that seriously. Surviving itself is already an achievement.\n\nSometimes I sit and think how weird life is. Because everything started from something so random. Just one random ah valo game with Nizam… then suddenly we started talking… and somehow life kept moving and now look at us. Still here. Still annoying each other. Still checking on each other. Funny how life works right.\n\nBut real talk Dina… I’m genuinely proud of you. I know things about you that most people don’t see. I know the struggles, the overthinking, the nights where everything feels too heavy. You went through literal shit sometimes… yet somehow you still keep going.\n\nThat strength inside you? Not everyone has that.\n\nAnd I’m really thankful you stayed in my life through everything. Through the stupid jokes, the deep talks, the chaos, the silence, the random nights where we just talk nonsense. Somehow you still stayed. And that means more to me than you probably realise.\n\nAlso I just wanna say this honestly. I’m actually glad you found someone that can fill that void inside you. (Even tho I hate it a bit)(JKJK) 😤 But really… if he makes you happy, then I’m happy for you too. Even though you very degil sometimes.\n\nBut please remember this one thing okay.\n\nDon’t ever lose yourself loving someone.\n\nDon’t shrink yourself just to keep someone. Don’t try to prove that you’re lovable enough for someone to stay. Because the truth is… you’ve always been lovable. You don’t need to prove that to anyone.\n\nIf not… why the hell I’m still here after all this time?\n\nI care about you Dina. Like genuinely. Through all the messy parts, the broken parts, the weird parts, the parts you think people wouldn’t stay for.\n\nEven if one day the world turns upside down…\n\neven if life becomes chaotic…\n\neven if you feel like you’re too much for people…\n\nI’m still here.\n\nThat won’t change.\n\nAnd one more thing. Please always trust Allah’s process. Sometimes the more ujian He gives, the more it means Allah notices you and loves you. He doesn’t test empty hearts. He tests hearts that are strong enough to grow.\n\nSo don’t ever give up on Allah okay. Even when things don’t make sense.\n\nAnyways… Happy Birthday Dina.\n\nYou are honestly one of the kindest souls I’ve ever met. A beautiful heart trying to exist in a very cruel and unforgiving world. And even when this world becomes messy and confusing…\n\nI’ll still be here.\n\nHshshs sorry if lately I’ve been a bit off. Been tired. Banyak benda nk hadam in life rn. But relax don’t worry bout me, santai. I’m a man. I’ll survive.\n\nBefore I end this… I just wanna say something a bit cheesy.\n\nMay our friendship last till the end of light.\n\nAnd maybe… if there are thousands of universes out there…\n\nin every single one of them, we still become friends again.\n\nBecause honestly…\n\nI’m really glad “we” happened.\n\nAnd if someday we slowly drift because life gets busy…\n\njust know that meeting you will always be one of the things I’m most grateful for in this life.\n\nHappy birthday Dina.\n\nThank you for existing in my life.\n\nKawan Barua kau\n\njoy.`;
        // --- GAME LOGIC ---

        // Wrong choice logic 
        wrongItems.forEach(item => {
            item.addEventListener('click', function() {
                // Add to specific counter based on the data-name attribute
                const itemName = this.getAttribute('data-name');
                clickStats[itemName]++;

                // Try to vibrate phone for 200ms
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                
                // Show a random taunt
                const randomTaunt = taunts[Math.floor(Math.random() * taunts.length)];
                tauntBox.innerText = randomTaunt;
                tauntBox.style.opacity = 1;

                // Add the red shake animation
                this.classList.add('error-shake');
                
                // Remove the animation class after it finishes
                setTimeout(() => {
                    this.classList.remove('error-shake');
                }, 400);
            });
        });

        // Typewriter function (SPED UP)
        let i = 0;
        function typeWriter() {
            if (i < officialMessage.length) {
                if (officialMessage.charAt(i) === '\n') {
                    typeWriterElement.innerHTML += '<br>';
                } else {
                    typeWriterElement.innerHTML += officialMessage.charAt(i);
                }
                i++;
                setTimeout(typeWriter, 15); // Changed from 40 to 15 for faster writing
            }
        }

        // The logic for when she clicks YOU
        chooseMeBtn.addEventListener('click', () => {
            
            // 1. PLAY THE SONG!
            // Browsers allow audio to play automatically only AFTER the user clicks something on the page.
            bgMusic.play();

            // 2. FIRE THE EMAIL TO YOU WITH SPECIFIC STATS
            // Make sure to replace YOUR_ACCESS_KEY_HERE
            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    access_key: 'b9f4bea3-2010-40eb-9134-c8ba0cacc56b', 
                    subject: 'Dina clicked the right present!',
                    message: `Dina finally clicked you! Here is the breakdown of her terrible choices:\n\n- Onitsuka: ${clickStats.Onitsuka} clicks\n- Samba: ${clickStats.Samba} clicks\n- Jersey: ${clickStats.Jersey} clicks\n\nTotal wrong clicks: ${clickStats.Onitsuka + clickStats.Samba + clickStats.Jersey}`
                })
            });

            // 3. FIRE CONFETTI
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#5865F2', '#ffffff', '#8b949e']
            });

            // 4. HIDE TAUNTS, KEEP PRESENTS VISIBLE
            tauntBox.style.opacity = 0;
            
            // 5. SHOW THE MESSAGE BELOW IT
            revealSection.classList.add('visible');
            
            // 6. SCROLL DOWN AND TYPE
            setTimeout(() => {
                revealSection.scrollIntoView({ behavior: 'smooth' });
                // Wait half a second, then start typing the message
                setTimeout(typeWriter, 500);
            }, 200);

        }, { once: true }); 
    </script>
</body>
</html>
